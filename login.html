<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Login und Registrierung für Lifesaving Baden.">
    <title>Login - Lifesaving Baden</title>
    <link rel="icon" type="image/png" href="assets/img/lifesaving-baden-logo.png">
    <link rel="stylesheet" href="assets/css/styles.css?v=20260713-admin-field-sizing">
    <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script defer src="assets/js/nav.js?v=20260712-mobile-fixed-header"></script>
    <script defer src="assets/js/firebase-config.js?v=20260711-checklist-gender"></script>
    <script defer src="assets/js/auth.js?v=20260713-identity-hint"></script>
  </head>
  <body data-page="login">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Lifesaving Baden Startseite">
        <span class="brand-mark" aria-hidden="true">
          <img src="assets/img/lifesaving-baden-logo.png" alt="">
        </span>
        <span>Lifesaving Baden</span>
      </a>
      <nav class="nav" aria-label="Hauptnavigation">
        <button class="nav-menu-toggle" type="button" data-nav-toggle aria-expanded="false" aria-controls="main-nav-links" aria-label="Menü öffnen">
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
        </button>
        <div class="nav-links" id="main-nav-links" data-nav-links>
          <a href="index.html#training">
            <span class="nav-link-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M4 18c2 0 2-1.2 4-1.2s2 1.2 4 1.2 2-1.2 4-1.2 2 1.2 4 1.2"></path>
                <path d="M4 21c2 0 2-1.2 4-1.2s2 1.2 4 1.2 2-1.2 4-1.2 2 1.2 4 1.2"></path>
                <circle cx="9" cy="7" r="2"></circle>
                <path d="m11 9 3.5 2.5L18 9"></path>
                <path d="m13.5 11.5-3 3"></path>
              </svg>
            </span>
            <span>Training</span>
          </a>
          <a href="index.html#termine">
            <span class="nav-link-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <rect x="4" y="5" width="16" height="15" rx="2"></rect>
                <path d="M8 3v4"></path>
                <path d="M16 3v4"></path>
                <path d="M4 10h16"></path>
                <path d="M8 14h3"></path>
                <path d="M14 14h2"></path>
              </svg>
            </span>
            <span>Termine</span>
          </a>
        </div>
      </nav>
    </header>

    <main class="auth-layout">
      <section class="auth-panel" aria-labelledby="auth-title">
        <p class="eyebrow">Mitgliederbereich</p>
        <h1 id="auth-title">Login oder Konto erstellen</h1>
        <p class="auth-note">
          Konten werden über Firebase verwaltet. Neue E-Mail-Konten müssen
          vor dem ersten Zugriff bestätigt werden.
        </p>

        <div class="tabs" role="tablist" aria-label="Login Auswahl">
          <button class="tab is-active" type="button" data-auth-tab="login" role="tab" aria-selected="true">Login</button>
          <button class="tab" type="button" data-auth-tab="register" role="tab" aria-selected="false">Registrieren</button>
        </div>

        <form class="auth-form" data-auth-form="login">
          <label>
            E-Mail
            <input name="email" type="email" autocomplete="email" required>
          </label>
          <label>
            Passwort
            <span class="password-field">
              <input name="password" type="password" autocomplete="current-password" minlength="8" required>
              <button class="password-toggle" type="button" data-password-toggle aria-label="Passwort anzeigen" aria-pressed="false">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path class="password-eye-open" d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path>
                  <circle class="password-eye-open" cx="12" cy="12" r="2.5"></circle>
                  <path class="password-eye-off" d="M3 3l18 18"></path>
                  <path class="password-eye-off" d="M6.2 6.8C3.8 8.4 2.5 12 2.5 12s3.5 6 9.5 6c1.8 0 3.4-.5 4.7-1.2"></path>
                  <path class="password-eye-off" d="M10.6 6.1c.5-.1.9-.1 1.4-.1 6 0 9.5 6 9.5 6s-.7 1.2-2 2.5"></path>
                </svg>
              </button>
            </span>
          </label>
          <p class="form-message" data-form-message="login" role="status"></p>
          <button class="button button-primary full-width" type="submit">Login</button>
          <button class="inline-action" type="button" data-reset-password>
            Passwort vergessen?
          </button>
        </form>

        <form class="auth-form is-hidden" data-auth-form="register">
          <label>
            Vorname
            <input name="firstName" type="text" autocomplete="given-name" minlength="2" required>
          </label>
          <label>
            Nachname
            <input name="lastName" type="text" autocomplete="family-name" minlength="2" required>
          </label>
          <label>
            E-Mail
            <input name="email" type="email" autocomplete="email" required>
          </label>
          <label>
            Passwort
            <span class="password-field">
              <input name="password" type="password" autocomplete="new-password" minlength="8" required>
              <button class="password-toggle" type="button" data-password-toggle aria-label="Passwort anzeigen" aria-pressed="false">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path class="password-eye-open" d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path>
                  <circle class="password-eye-open" cx="12" cy="12" r="2.5"></circle>
                  <path class="password-eye-off" d="M3 3l18 18"></path>
                  <path class="password-eye-off" d="M6.2 6.8C3.8 8.4 2.5 12 2.5 12s3.5 6 9.5 6c1.8 0 3.4-.5 4.7-1.2"></path>
                  <path class="password-eye-off" d="M10.6 6.1c.5-.1.9-.1 1.4-.1 6 0 9.5 6 9.5 6s-.7 1.2-2 2.5"></path>
                </svg>
              </button>
            </span>
          </label>
          <p class="form-message" data-form-message="register" role="status"></p>
          <button class="button button-primary full-width" type="submit">Konto erstellen</button>
        </form>

        <div class="auth-divider" aria-hidden="true">
          <span></span>
          <strong>oder</strong>
          <span></span>
        </div>

        <button class="button button-google full-width" type="button" data-google-login>
          <span aria-hidden="true">G</span>
          Mit Google fortfahren
        </button>

        <button class="inline-action is-hidden" type="button" data-resend-verification>
          Bestätigungs-Mail erneut senden
        </button>
      </section>

      <aside class="auth-aside" aria-label="Hinweis">
        <div class="status-panel">
          <img class="moose-icon status-moose" src="assets/img/elch-gelb.png" alt="" aria-hidden="true">
          <p>Firebase muss einmalig in der Konsole eingerichtet und hier eingetragen werden.</p>
        </div>
      </aside>
    </main>
  </body>
</html>
